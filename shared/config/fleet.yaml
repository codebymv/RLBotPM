# Fleet Orchestration - Run both bots in parallel
# ===============================================
# Usage:
#   python main.py fleet start --dry-run   (paper mode, no real money)
#   python main.py fleet start             (live mode, requires promotion gates)

fleet:
  # Global circuit breaker (orchestrator-level)
  max_combined_daily_loss_usd: 50.0   # Halt both bots if combined daily loss exceeds this
  max_combined_drawdown_pct: 0.15     # Halt if combined drawdown > 15%

  # Preflight: require both promotion gates to pass before starting live
  require_kalshi_gate: true
  require_rl_gate: true

# -----------------------------------------------------------------------------
# Bot 1: Kalshi Prediction Markets
#   --dry-run  → kalshi paper-trade --live (paper portfolio, no real orders)
#   live       → kalshi live-trade (real orders)
# -----------------------------------------------------------------------------
kalshi:
  enabled: true
  interval: 300
  min_edge: 0.015
  max_edge: 0.60
  min_price: 1
  max_price: 50
  bankroll: 100.0                # paper-trade only
  max_positions: 10
  max_new_trades_per_scan: 4
  max_session_loss: 5.0          # paper session loss stop
  series: null                   # null = all crypto series
  # live-trade only (real money)
  max_cost: 1.0
  max_total: 10.0
  max_loss_streak: 3
  max_daily_loss: 5.0

# -----------------------------------------------------------------------------
# Bot 2: RL Crypto Spot (Coinbase)
#   --dry-run  → rl-paper-trade (live data, paper portfolio, no real orders)
#   live       → live_trader --mode live (real orders via Coinbase)
# -----------------------------------------------------------------------------
rl_crypto:
  enabled: true
  model: "models/best_model_run_174.zip"
  symbols: null                  # null = all from DATA_SYMBOLS env var
  interval: "1h"
  capital: 1000.0
  duration: 0                    # 0 = indefinite
  # live-trade only
  symbol: "BTC-USD"
  tick_interval: 60
