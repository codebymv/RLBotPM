# PPO Model Configuration
# These hyperparameters control how the RL agent learns

ppo:
  # Policy type: MlpPolicy or MlpLstmPolicy
  policy_type: "MlpPolicy"
  # Learning rate - how fast the agent learns
  # 1e-4 for new feature sets (arbitrage mode)
  # 3e-4 is standard for training from scratch
  learning_rate: 0.0003
  
  # Number of steps to collect per environment before updating
  # Higher = more stable but slower learning
  n_steps: 2048
  
  # Mini-batch size for training
  # Must be a divisor of (n_steps * n_envs)
  batch_size: 512
  
  # Number of training epochs per rollout
  # Higher = more learning per data collected, but risk overfitting
  n_epochs: 10
  
  # Discount factor (gamma)
  # How much to value future rewards (0.99 = very forward-looking)
  gamma: 0.95
  
  # GAE lambda for advantage estimation
  # Balances bias vs variance in advantage estimates
  gae_lambda: 0.95
  
  # PPO clipping parameter
  # Limits how much policy can change per update (prevents destructive updates)
  clip_range: 0.2
  
  # Entropy coefficient
  # Encourages exploration (higher = more random actions)
  ent_coef: 0.01
  
  # Value function coefficient
  # Weight of value loss in total loss
  vf_coef: 0.5
  
  # Gradient clipping
  # Prevents exploding gradients
  max_grad_norm: 0.5

recurrent:
  # Only used when policy_type is MlpLstmPolicy
  sequence_length: 1
  lstm_hidden_size: 128
  lstm_layers: 1
  lstm_dropout: 0.0
  shared_lstm: false
  enable_critic_lstm: true

# Training configuration
training:
  # Total training episodes
  total_timesteps: 300000
  
  # Evaluate every N episodes
  eval_frequency: 10000
  
  # Save checkpoint every N episodes
  checkpoint_frequency: 10000
  
  # Number of parallel environments (for faster training)
  # Set to 1 for easier debugging, 4+ for production
  num_parallel_envs: 4
  
  # Use GPU if available
  use_gpu: true
  
  # TensorBoard logging
  tensorboard_log: "./logs/tensorboard"
  
  # Verbosity (0=none, 1=info, 2=debug)
  verbose: 1

  # Reward normalization (stabilizes training)
  normalize_rewards: true

  # Early stopping configuration
  early_stopping:
    eval_episodes: 20
    patience: 20
    min_delta: 0.0
    metric: "golden_score"
    min_profit_factor: 1.0
    min_total_return: 0.0
    max_drawdown: 0.25
    max_fees_pct_of_gross_pnl: 0.50

# Environment configuration
environment:
  # Strategy env: crypto (default), momentum, mean_reversion, breakout
  strategy: "crypto"
  # Optional reward profile from shared/config/reward_config.yaml profiles
  reward_profile: "pnl_only"
  
  # Initial capital for backtesting
  initial_capital: 1000.0
  
  # Maximum steps per episode
  max_steps: 500
  
  # Frame stacking (provide history to agent)
  # Stacks last N observations (e.g. 4) into a single observation vector
  frame_stack: 4
  
  # Transaction costs are configured in shared/config/risk_config.yaml
  # (maker_fee_pct, taker_fee_pct, slippage). The environment reads them
  # from risk_config directly — do NOT duplicate them here.

# Curriculum learning stages (NOT IMPLEMENTED in training code — kept for reference)
curriculum:
  enabled: false
  
  stages:
    - name: "Stage 1 - Simple Markets"
      timesteps: 20000
      description: "Highly liquid, simple binary markets"
      filters:
        min_volume: 50000
        min_liquidity: 5000
        categories: ["sports", "entertainment"]
    
    - name: "Stage 2 - Mixed Markets"
      timesteps: 30000
      description: "Medium liquidity, mixed categories"
      filters:
        min_volume: 10000
        min_liquidity: 1000
        categories: ["sports", "entertainment", "crypto"]
    
    - name: "Stage 3 - All Markets"
      timesteps: 50000
      description: "All market types"
      filters:
        min_volume: 1000
        min_liquidity: 500
        categories: null  # All categories

# Specialist routing (optional) for evaluation/inference
specialist_router:
  enabled: true
  model_paths:
    momentum: "bot/models/best_model_run_168"
    mean_reversion: "bot/models/best_model_run_169"
    breakout: "bot/models/best_model_run_167"
  router:
    momentum_abs_return_24h: 0.025
    breakout_abs_return_1h: 0.008
    low_volatility_threshold: 0.012
    momentum_ratio_threshold: 1.0
    trend_strength_threshold: 0.25
